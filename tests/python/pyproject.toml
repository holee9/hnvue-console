[tool.pytest.ini_options]
# SPEC-TEST-001 FR-TEST-08: JUnit XML reporting
testpaths = ["simulator/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# JUnit XML output for CI integration
addopts = "-v --tb=short --junit-xml=junit-python.xml"

# Async support
asyncio_mode = "auto"

# Custom markers for traceability
markers = [
    "requirement(id): Link test to SPEC requirement ID",
    "safety_class(class): IEC 62304 safety class (A, B, C)",
]

[tool.coverage.run]
source = ["simulator"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
fail_under = 85

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B"]
ignore = ["E501"]
