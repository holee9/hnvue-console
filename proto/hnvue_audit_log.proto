syntax = "proto3";

package hnvue.ipc;
import "hnvue_common.proto";
option csharp_namespace = "HnVue.Ipc";

// Audit Log service: Regulatory compliance audit trail (IEC 62304, FDA 21 CFR Part 11)
// GUI -> Core Engine (unary) + Core Engine -> GUI (streaming for real-time monitoring)
service AuditLogService {
  // Log an audit event
  rpc LogEvent(LogEventRequest) returns (LogEventResponse);

  // Query audit log entries
  rpc QueryAuditLog(QueryAuditLogRequest) returns (QueryAuditLogResponse);

  // Get a single audit entry by ID
  rpc GetAuditEntry(GetAuditEntryRequest) returns (GetAuditEntryResponse);

  // Subscribe to real-time audit events (for monitoring)
  rpc SubscribeAuditEvents(AuditEventSubscribeRequest) returns (stream AuditEvent);

  // Export audit log for compliance reporting
  rpc ExportAuditLog(ExportAuditLogRequest) returns (ExportAuditLogResponse);
}

message LogEventRequest {
  AuditEventType event_type = 1;
  string event_category = 2;        // PATIENT, EXPOSURE, SYSTEM, USER, etc.
  string event_description = 3;
  string user_id = 4;
  string workstation_id = 5;
  string patient_id = 6;            // Optional, if event is patient-related
  string study_id = 7;              // Optional, if event is study-related
  map<string, string> event_data = 8;  // Additional key-value data
  SeverityLevel severity = 9;
  Timestamp request_timestamp = 10;
}

enum AuditEventType {
  AUDIT_EVENT_TYPE_UNSPECIFIED = 0;
  // User events
  AUDIT_EVENT_TYPE_USER_LOGIN = 1;
  AUDIT_EVENT_TYPE_USER_LOGOUT = 2;
  AUDIT_EVENT_TYPE_USER_LOGIN_FAILED = 3;
  AUDIT_EVENT_TYPE_PASSWORD_CHANGE = 4;
  // Patient events
  AUDIT_EVENT_TYPE_PATIENT_VIEWED = 10;
  AUDIT_EVENT_TYPE_PATIENT_CREATED = 11;
  AUDIT_EVENT_TYPE_PATIENT_UPDATED = 12;
  AUDIT_EVENT_TYPE_PATIENT_ACCESSED = 13;
  // Exposure events
  AUDIT_EVENT_TYPE_EXPOSURE_STARTED = 20;
  AUDIT_EVENT_TYPE_EXPOSURE_COMPLETED = 21;
  AUDIT_EVENT_TYPE_EXPOSURE_ABORTED = 22;
  AUDIT_EVENT_TYPE_EXPOSURE_FAILED = 23;
  // System events
  AUDIT_EVENT_TYPE_SYSTEM_STARTUP = 30;
  AUDIT_EVENT_TYPE_SYSTEM_SHUTDOWN = 31;
  AUDIT_EVENT_TYPE_CALIBRATION_STARTED = 32;
  AUDIT_EVENT_TYPE_CALIBRATION_COMPLETED = 33;
  AUDIT_EVENT_TYPE_CALIBRATION_FAILED = 34;
  AUDIT_EVENT_TYPE_CONFIGURATION_CHANGED = 35;
  // QC events
  AUDIT_EVENT_TYPE_QC_PERFORMED = 40;
  AUDIT_EVENT_TYPE_QC_FAILED = 41;
  // Dose events
  AUDIT_EVENT_TYPE_DOSE_ALERT = 50;
  AUDIT_EVENT_TYPE_DOSE_ALERT_ACKNOWLEDGED = 51;
  // Security events
  AUDIT_EVENT_TYPE_ACCESS_DENIED = 60;
  AUDIT_EVENT_TYPE_DATA_EXPORT = 61;
  AUDIT_EVENT_TYPE_DATA_IMPORT = 62;
}

enum SeverityLevel {
  SEVERITY_LEVEL_UNSPECIFIED = 0;
  SEVERITY_LEVEL_INFO = 1;
  SEVERITY_LEVEL_WARNING = 2;
  SEVERITY_LEVEL_ERROR = 3;
  SEVERITY_LEVEL_CRITICAL = 4;
}

message LogEventResponse {
  bool success = 1;
  string audit_entry_id = 2;
  IpcError error = 3;
  Timestamp response_timestamp = 4;
}

message QueryAuditLogRequest {
  Timestamp start_timestamp = 1;
  Timestamp end_timestamp = 2;
  string user_id = 3;
  string patient_id = 4;
  AuditEventType event_type_filter = 5;
  SeverityLevel min_severity = 6;
  int32 max_results = 7;
  int32 offset = 8;                 // For pagination
  Timestamp request_timestamp = 9;
}

message QueryAuditLogResponse {
  repeated AuditEntry entries = 1;
  int32 total_count = 2;
  bool has_more = 3;
  IpcError error = 4;
}

message AuditEntry {
  string audit_entry_id = 1;
  AuditEventType event_type = 2;
  string event_category = 3;
  string event_description = 4;
  string user_id = 5;
  string username = 6;
  string workstation_id = 7;
  string patient_id = 8;
  string study_id = 9;
  map<string, string> event_data = 10;
  SeverityLevel severity = 11;
  Timestamp event_timestamp = 12;
  string correlation_id = 13;       // For linking related events
}

message GetAuditEntryRequest {
  string audit_entry_id = 1;
  Timestamp request_timestamp = 2;
}

message GetAuditEntryResponse {
  AuditEntry entry = 1;
  IpcError error = 2;
}

message AuditEventSubscribeRequest {
  repeated AuditEventType event_type_filter = 1;  // Empty = all events
  SeverityLevel min_severity = 2;
}

message AuditEvent {
  AuditEntry entry = 1;
}

message ExportAuditLogRequest {
  Timestamp start_timestamp = 1;
  Timestamp end_timestamp = 2;
  ExportFormat format = 3;
  string export_path = 4;           // Optional, default path if not specified
  string requested_by = 5;
  Timestamp request_timestamp = 6;
}

enum ExportFormat {
  EXPORT_FORMAT_UNSPECIFIED = 0;
  EXPORT_FORMAT_CSV = 1;
  EXPORT_FORMAT_JSON = 2;
  EXPORT_FORMAT_XML = 3;
  EXPORT_FORMAT_PDF = 4;            // Formatted report
}

message ExportAuditLogResponse {
  bool success = 1;
  string exported_file_path = 2;
  int32 record_count = 3;
  IpcError error = 4;
  Timestamp response_timestamp = 5;
}
