name: HnVue CI Pipeline

# SPEC-TEST-001 Phase 4: CI Pipeline Integration
# Implements FR-TEST-08: CI Reporting with JUnit XML and coverage reports

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  PYTHON_VERSION: "3.11"

jobs:
  setup:
    name: Setup and Cache Dependencies
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache vcpkg packages
        uses: actions/cache@v3
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            build/vcpkg_installed
          key: vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-

      - name: Cache CMake build
        uses: actions/cache@v3
        with:
          path: |
            build
            artifacts
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'libs/**/CMakeLists.txt', 'src/**/*.csproj') }}
          restore-keys: |
            cmake-

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            tests/python/.venv
          key: python-${{ env.PYTHON_VERSION }}-${{ hashFiles('tests/python/requirements.txt') }}
          restore-keys: |
            python-

  build-cpp:
    name: Build C++ Libraries
    runs-on: [self-hosted, windows]
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.25.x'

      - name: Configure CMake
        run: cmake --preset ci

      - name: Build C++ libraries
        run: cmake --build --preset ci --target all-libs --config ${{ env.CONFIGURATION }}

      - name: Upload C++ build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: cpp-build-artifacts
          path: |
            build/libs/**/*.lib
            build/libs/**/*.dll
          retention-days: 90

  build-csharp:
    name: Build C# Projects
    runs-on: [self-hosted, windows]
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore HnVue.sln

      - name: Build C# projects
        run: dotnet build HnVue.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Upload C# build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: csharp-build-artifacts
          path: |
            artifacts/bin/**/*.dll
            artifacts/bin/**/*.exe
          retention-days: 90

  test-cpp:
    name: Test C++ (GTest)
    runs-on: [self-hosted, windows]
    needs: build-cpp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.25.x'

      - name: Download C++ build artifacts
        uses: actions/download-artifact@v3
        with:
          name: cpp-build-artifacts
          path: build/

      - name: Run C++ tests
        run: ctest --preset ci --output-on-failure

      - name: Upload C++ test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: cpp-test-results
          path: |
            build/Testing/**/*.xml
          retention-days: 90

  test-csharp:
    name: Test C# (xUnit)
    runs-on: [self-hosted, windows]
    needs: build-csharp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run C# unit tests with coverage
        run: |
          dotnet test HnVue.sln -c ${{ env.CONFIGURATION }} --no-build `
            --logger "trx;LogFileName=test-results.trx" `
            --logger "junit;LogFileName=test-results.xml" `
            --collect:"XPlat Code Coverage" `
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura,opencover `
            --results-directory TestResults

      - name: Upload C# test results (TRX)
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: csharp-test-results
          path: TestResults/**/*.trx
          retention-days: 90

      - name: Upload C# test results (JUnit XML)
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: csharp-junit-results
          path: TestResults/**/test-results.xml
          retention-days: 90

      - name: Upload C# coverage reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: csharp-coverage-reports
          path: |
            TestResults/**/coverage.cobertura.xml
            TestResults/**/coverage.opencover.xml
          retention-days: 90

      - name: Verify coverage threshold
        run: |
          # SPEC-TEST-001 NFR-TEST-01: 85% coverage minimum
          $CoverageThreshold = 85.0
          $CoverageFile = Get-ChildItem -Path TestResults -Filter "coverage.cobertura.xml" -Recurse | Select-Object -First 1

          if ($CoverageFile) {
            [xml]$Xml = Get-Content $CoverageFile.FullName
            $LineRate = [double]$Xml.coverage."line-rate"
            $CoveragePercent = $LineRate * 100

            Write-Host "Coverage: $([math]::Round($CoveragePercent, 2))%"
            Write-Host "Threshold: $CoverageThreshold%"

            if ($CoveragePercent -lt $CoverageThreshold) {
              Write-Error "Coverage $CoveragePercent% is below threshold $CoverageThreshold%"
              exit 1
            }
            Write-Host "Coverage threshold passed"
          } else {
            Write-Warning "Coverage file not found - skipping threshold check"
          }

  test-python:
    name: Test Python Simulators
    runs-on: [self-hosted, windows]
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: tests/python/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/python/requirements.txt

      - name: Run Python unit tests with coverage
        run: |
          cd tests/python
          pytest simulator/tests/ -v --cov=simulator --cov-report=xml:coverage.xml --cov-report=html:htmlcov --junit-xml=junit.xml

      - name: Upload Python test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: python-test-results
          path: |
            tests/python/junit.xml
            tests/python/coverage.xml
          retention-days: 90

      - name: Upload Python coverage reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: python-coverage-reports
          path: |
            tests/python/coverage.xml
            tests/python/htmlcov/
          retention-days: 90

  test-dicom-conformance:
    name: DICOM Conformance Tests
    runs-on: [self-hosted, windows]
    needs: [build-csharp, test-python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: tests/python/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/python/requirements.txt

      - name: Start Orthanc container
        run: |
          docker-compose -f tests/docker/docker-compose.orthanc.yml up -d

      - name: Wait for Orthanc health check
        run: |
          $MaxRetries = 12
          $RetryCount = 0
          $Healthy = $false

          while (-not $Healthy -and $RetryCount -lt $MaxRetries) {
            Start-Sleep -Seconds 5
            try {
              $Response = Invoke-WebRequest -Uri "http://localhost:8042/" -UseBasicParsing
              if ($Response.StatusCode -eq 200) {
                $Healthy = $true
                Write-Host "Orthanc is healthy"
              }
            } catch {
              Write-Host "Waiting for Orthanc... ($($RetryCount + 1)/$MaxRetries)"
            }
            $RetryCount++
          }

          if (-not $Healthy) {
            Write-Error "Orthanc failed to become healthy within 60 seconds"
            exit 1
          }

      - name: Run DICOM conformance tests
        run: |
          python tests/docker/dicom_cstore_test.py --junit-output tests/docker/dicom-conformance-results.xml

      - name: Stop Orthanc container
        if: always()
        run: |
          docker-compose -f tests/docker/docker-compose.orthanc.yml down

      - name: Upload DICOM conformance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dicom-conformance-results
          path: tests/docker/dicom-conformance-results.xml
          retention-days: 90

  test-integration:
    name: Integration Tests (Full Stack)
    runs-on: [self-hosted, windows]
    needs: [build-csharp, test-python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Start all Docker services
        run: |
          docker-compose -f tests/docker/docker-compose.simulators.yml up -d

      - name: Wait for services health check
        run: |
          # Wait for Orthanc
          $MaxRetries = 12
          $RetryCount = 0
          $Healthy = $false

          while (-not $Healthy -and $RetryCount -lt $MaxRetries) {
            Start-Sleep -Seconds 5
            try {
              $Response = Invoke-WebRequest -Uri "http://localhost:8042/" -UseBasicParsing
              if ($Response.StatusCode -eq 200) {
                $Healthy = $true
                Write-Host "All services are healthy"
              }
            } catch {
              Write-Host "Waiting for services... ($($RetryCount + 1)/$MaxRetries)"
            }
            $RetryCount++
          }

          if (-not $Healthy) {
            Write-Error "Services failed to become healthy within 60 seconds"
            exit 1
          }

      - name: Run integration tests
        run: |
          dotnet test tests/integration/HnVue.Integration.Tests/HnVue.Integration.Tests.csproj `
            -c ${{ env.CONFIGURATION }} --no-build `
            --logger "trx;LogFileName=integration-test-results.trx" `
            --logger "junit;LogFileName=integration-test-results.xml"

      - name: Stop all Docker services
        if: always()
        run: |
          docker-compose -f tests/docker/docker-compose.simulators.yml down -v

      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/integration-test-results.xml
          retention-days: 90

  coverage-gate:
    name: Component-Level Coverage Gates
    runs-on: [self-hosted, windows]
    needs: [test-cpp, test-csharp, test-python]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: tests/python/requirements.txt

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v3
        with:
          path: coverage-artifacts

      - name: Run component-level coverage verification
        run: |
          # Find all Cobertura coverage files
          $CoberturaFiles = Get-ChildItem -Path coverage-artifacts -Filter "*.xml" -Recurse | Where-Object {
            $Content = Get-Content $_.FullName -Raw
            $Content -match "coverage|cobertura"
          }

          Write-Host "Found $($CoberturaFiles.Count) coverage files"

          foreach ($File in $CoberturaFiles) {
            Write-Host "Processing: $($File.FullName)"
            python tests/coverage_gates/verify_coverage.py --cobertura $File.FullName --fail-on-error --json-output coverage-result.json
          }

      - name: Upload coverage gate results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-gate-results
          path: |
            coverage-result.json
            coverage-artifacts/**/coverage.cobertura.xml
            coverage-artifacts/**/coverage.xml
          retention-days: 90

      - name: Generate coverage gate summary
        run: |
          $Summary = @"
          # Component-Level Coverage Gate Report

          **Generated**: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}

          ## SPEC-TEST-001 Compliance

          ### NFR-TEST-01: 85% Minimum Coverage
          All Class A/B components must meet their respective thresholds.

          ### NFR-TEST-01.1: Class C 100% Decision Coverage
          Generator Control and AEC must have 100% decision coverage.

          ### NFR-TEST-04: Class C Merge Gate
          Merge is blocked if Class C components fall below 100% decision coverage.

          ## Component Thresholds (Section 1.3)

          | Component | Class | Type | Threshold |
          |-----------|-------|------|-----------|
          | Generator Control | C | Decision | 100% |
          | AEC | C | Decision | 100% |
          | Image Processing | B | Statement | 85% |
          | DICOM | B | Statement | 85% |
          | Dose Management | B | Statement | 90% |
          | UI/Viewer | B | Statement | 80% |
          | Patient Management | A | Statement | 85% |

          ## Artifacts
          All coverage reports archived with 90-day retention per FR-TEST-08.5
          "@

          $Summary | Out-File -FilePath coverage-gate-summary.md
          Write-Host $Summary

      - name: Upload coverage gate summary
        uses: actions/upload-artifact@v3
        with:
          name: coverage-gate-summary
          path: coverage-gate-summary.md
          retention-days: 90

  archive:
    name: Archive Artifacts
    runs-on: [self-hosted, windows]
    needs: [test-cpp, test-csharp, test-python, test-dicom-conformance, test-integration, coverage-gate, rtm-gate]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate build summary
        run: |
          $Summary = @"
          # HnVue CI Build Summary

          **Build Configuration**: ${{ env.CONFIGURATION }}
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}

          ## Build Status
          - C++ Build: ${{ needs.build-cpp.result }}
          - C# Build: ${{ needs.build-csharp.result }}

          ## Test Results
          - C++ Tests (GTest): ${{ needs.test-cpp.result }}
          - C# Tests (xUnit): ${{ needs.test-csharp.result }}
          - Python Tests (pytest): ${{ needs.test-python.result }}
          - DICOM Conformance: ${{ needs.test-dicom-conformance.result }}
          - Integration Tests: ${{ needs.test-integration.result }}

          ## Coverage Report
          - Coverage Gate: ${{ needs.coverage-gate.result }}
          - RTM Gate: ${{ needs.rtm-gate.result }}

          ## Artifacts (90-day retention)
          - cpp-build-artifacts
          - csharp-build-artifacts
          - cpp-test-results
          - csharp-test-results
          - csharp-junit-results
          - csharp-coverage-reports
          - python-test-results
          - python-coverage-reports
          - dicom-conformance-results
          - integration-test-results
          - consolidated-coverage-reports

          ## Compliance
          All artifacts archived per SPEC-INFRA-001 FR-INFRA-03.6 and SPEC-TEST-001 FR-TEST-08.5
          "@

          $Summary | Out-File -FilePath build-summary.md

      - name: Upload build summary
        uses: actions/upload-artifact@v3
        with:
          name: build-summary
          path: build-summary.md
          retention-days: 90

  # SPEC-TEST-001 Phase 3.3: RTM Gate
  rtm-gate:
    name: RTM Validation Gate
    runs-on: [self-hosted, windows]
    needs: [test-cpp, test-csharp, test-python]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: tests/python/requirements.txt

      - name: Run RTM validation
        run: |
          python tests/scripts/rtm_gate.py `
            tests/traceability/rtm.csv `
            --output rtm-gate-result.json `
            --markdown rtm-gate-report.md

      - name: Upload RTM gate results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: rtm-gate-results
          path: |
            rtm-gate-result.json
            rtm-gate-report.md
          retention-days: 90

      - name: Fail if RTM incomplete
        if: failure()
        run: |
          Write-Error "RTM validation failed - requirements missing test coverage"
          exit 1
